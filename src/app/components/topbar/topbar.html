<div class="topbar align-items-center px-3 px-md-4 py-3">
  <div class="d-flex align-items-center justify-content-between w-100">
    <div class="d-flex align-items-center flex-grow-1">
      <button class="btn btn-outline-secondary d-lg-none me-2 me-md-3" (click)="toggleMenu.emit()">
        <i class="bi bi-list"></i>
      </button>
      <a [routerLink]="getRoutePath('dashboard')" class="text-decoration-none">
        <h4 class="mb-0 text-success title-responsive d-flex align-items-center">
          <figure class="m-0">
            <img src="images/logo-energy.png" alt="Logo" class="logo mr-2" />
          </figure>
          <span>Transición Energética Justa</span>
        </h4>
      </a>
    </div>
    <div class="dropdown">
      <button
        class="btn btn-link text-decoration-none text-dark dropdown-toggle d-flex align-items-center p-0"
        type="button"
        id="userDropdown"
        data-bs-toggle="dropdown"
        aria-expanded="false"
      >
        <span class="me-2 d-none d-md-inline">Bienvenido, Adrian Cano</span>
        <i class="bi bi-person-circle fs-4"></i>
      </button>
      <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="userDropdown">
        <li class="d-md-none">
          <span class="dropdown-item-text text-muted">
            <small>Bienvenido, Analista</small>
          </span>
        </li>
        <li class="d-md-none"><hr class="dropdown-divider" /></li>
        <li>
          <a class="dropdown-item" href="#"> <i class="bi bi-person me-2"></i>Mi Perfil </a>
        </li>
        <li>
          <a class="dropdown-item" href="#"> <i class="bi bi-gear me-2"></i>Configuración </a>
        </li>
        <li><hr class="dropdown-divider" /></li>
        <li>
          <a class="dropdown-item text-danger" href="#" (click)="logout()">
            <i class="bi bi-box-arrow-right me-2"></i>Cerrar Sesión
          </a>
        </li>
      </ul>
    </div>
  </div>
</div>
