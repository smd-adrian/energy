<div class="bg-white shadow-sm rounded p-4 mb-4">
  <div class="d-flex flex-column flex-md-row align-items-start justify-content-between gap-3">
    <div>
      <h2 class="fw-bold fs-2 mb-1">Gestión de usuarios</h2>
      <p class="text-muted mb-0">Ver y administrar los usuarios del sistema.</p>
    </div>
    <a [routerLink]="createUserPath" class="btn btn-success">Nuevo usuario</a>
  </div>
</div>

<div class="bg-white shadow-sm rounded p-4 mb-4">
  <div class="card-body">
    <h5 class="mb-3">Resumen de Usuarios</h5>
    @if (users().length) {
      <div class="table-responsive">
        <table class="table align-middle">
          <thead class="table-light">
            <tr>
              <th>ID</th>
              <th>Nombre de Usuario</th>
              <th>Email</th>
              <th>Rol</th>
              <th class="text-end">Acciones</th>
            </tr>
          </thead>
          <tbody>
            @for (user of users(); track user.id) {
              <tr>
                <td>{{ user.id }}</td>
                <td>{{ user.username }}</td>
                <td>{{ user.email }}</td>
                <td class="text-success fw-bold">{{ user.role }}</td>
                <td>
                  <div class="d-flex justify-content-end flex-wrap gap-2 user-actions">
                    <a
                      [routerLink]="getUpdatePath(user.id)"
                      class="btn btn-sm btn-outline-primary action-icon-btn"
                      title="Editar"
                      aria-label="Editar usuario"
                    >
                      <i class="bi bi-pencil" aria-hidden="true"></i>
                      <span class="visually-hidden">Editar</span>
                    </a>
                    <button
                      type="button"
                      class="btn btn-sm btn-outline-danger action-icon-btn"
                      title="Eliminar"
                      aria-label="Eliminar usuario"
                      [disabled]="isDeletingUserId() === user.id"
                      (click)="onDeleteUser(user)"
                    >
                      @if (isDeletingUserId() === user.id) {
                        <span class="spinner-border spinner-border-sm" aria-hidden="true"></span>
                        <span class="visually-hidden">Eliminando</span>
                      } @else {
                        <i class="bi bi-trash" aria-hidden="true"></i>
                        <span class="visually-hidden">Eliminar</span>
                      }
                    </button>
                  </div>
                </td>
              </tr>
            }
          </tbody>
        </table>
      </div>
    } @else {
      <p class="card-text placeholder-glow">
        <span class="placeholder col-7"></span>
        <span class="placeholder col-4"></span>
        <span class="placeholder col-4"></span>
        <span class="placeholder col-6"></span>
        <span class="placeholder col-8"></span>
      </p>
    }
  </div>
</div>
